[build]
target = "loongarch64-unknown-none"

[target.loongarch64-unknown-none]
linker = "/opt/cross-tools/bin/loongarch64-unknown-linux-gnu-gcc"
rustflags = [
    "-C", "link-arg=-Tkernel/src/arch/loongarch64/linker.ld",
    "-C", "relocation-model=static",
    "-C", "debuginfo=2",
    "-C", "link-arg=-nostartfiles",
    "-C", "link-arg=-nostdlib",
]

[target.riscv64gc-unknown-none-elf]
rustflags = [
    "-C", "code-model=medium",
    "-C", "relocation-model=static",
]


[profile.release]
codegen-units = 1



[source.crates-io]
replace-with = "vendored-sources"

[source.vendored-sources]
directory = "vendor"
