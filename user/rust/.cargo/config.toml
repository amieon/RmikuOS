[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "link-arg=-T../linker-riscv64.ld",
    "-C", "link-arg=--no-relax",
]

[target.loongarch64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "link-arg=-T../linker-loongarch64.ld",
    "-C", "link-arg=-mno-relax",     
]
