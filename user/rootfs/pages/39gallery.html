<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060e0d;--card:#0d1d1bcc;--ink:#eaf6f3;--dim:#83aaa3;--teal:#39c5bb;--pink:#ff7bac;--line:#39c5bb26}
body{background:radial-gradient(1200px 600px at 70% -10%,#132d28 0,var(--bg) 55%);background-color:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:40px 22px 40px}
.brand{display:flex;justify-content:space-between;align-items:center;margin-bottom:46px}
.brand .logo{font-weight:800;font-size:22px;letter-spacing:1px}
.brand .logo b{color:var(--teal)}
.brand .sub{font-size:13px;color:var(--dim)}
h1{font-size:56px;line-height:1.1;font-weight:800;background:linear-gradient(92deg,var(--teal),#7ee8e2 45%,var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{margin-top:16px;color:var(--dim);font-size:16px;max-width:640px;line-height:1.8}
.hero .stats{display:flex;gap:26px;margin-top:26px;font-size:14px;color:var(--dim)}
.hero .stats b{color:var(--teal);font-size:22px;margin-right:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px;margin-top:46px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s,border-color .25s;backdrop-filter:blur(8px)}
.card:hover{transform:translateY(-6px);box-shadow:0 18px 44px #39c5bb22;border-color:#39c5bb66}
.thumb{width:100%;aspect-ratio:4/4.6;object-fit:cover;display:block;background:linear-gradient(135deg,#123b38,#0d2422)}
.cbody{padding:16px 18px 18px}
.cname{font-size:20px;font-weight:700}
.ctag{color:var(--teal);font-size:13px;margin:6px 0 10px}
.cbrief{color:var(--dim);font-size:13.5px;line-height:1.75}
.more{margin-top:12px;font-size:13px;color:var(--pink)}
.ph{display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;width:100%;aspect-ratio:4/4.6;background:linear-gradient(135deg,#123b38,#0d2422);color:var(--teal)}
.ph .n{font-size:44px}.ph .t{font-size:14px;color:var(--dim)}
.ban{width:100%;max-height:62vh;object-fit:cover;border-radius:18px;border:1px solid var(--line);display:block;background:linear-gradient(135deg,#123b38,#0d2422)}
.back{display:inline-block;margin:6px 0 22px;color:var(--teal);text-decoration:none;font-size:14px}
.dhead{margin:22px 0 8px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.dname{font-size:40px;font-weight:800}
.dtag{color:var(--teal);font-size:15px}
.region{font-size:12px;color:var(--pink);border:1px solid #ff7bac55;border-radius:999px;padding:3px 12px}
.cols{display:grid;grid-template-columns:1.5fr 1fr;gap:34px;margin-top:14px}
@media(max-width:820px){.cols{grid-template-columns:1fr}h1{font-size:40px}}
.bio{color:#c9e2dc;font-size:15px;line-height:2.0}
h3{font-size:14px;color:var(--dim);letter-spacing:2px;margin:28px 0 12px}
.facts{list-style:none}
.facts li{padding:7px 0 7px 26px;position:relative;color:#c9e2dc;font-size:14px;line-height:1.7;border-bottom:1px dashed #39c5bb1a}
.facts li::before{content:"♪";position:absolute;left:2px;color:var(--teal)}
.lnks{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
.btn{font-size:13px;color:var(--teal);text-decoration:none;border:1px solid #39c5bb55;border-radius:999px;padding:7px 16px;transition:.2s}
.btn:hover{background:#39c5bb18}
.wk{font-size:13px;color:var(--dim);margin-top:10px;line-height:1.9}
.wk a{color:var(--teal);text-decoration:none}
.img2{width:100%;border-radius:14px;border:1px solid var(--line);margin-top:14px;display:block}
.pn{display:flex;justify-content:space-between;margin-top:44px;gap:12px}
.pn a{color:var(--dim);text-decoration:none;font-size:14px;border:1px solid var(--line);border-radius:12px;padding:10px 16px;flex:1;text-align:center;transition:.2s}
.pn a:hover{color:var(--teal);border-color:#39c5bb66}
footer{margin-top:64px;padding-top:22px;border-top:1px solid var(--line);color:var(--dim);font-size:12.5px;line-height:2}
.fade{animation:fade .5s}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
</style>
</head>

for(var i=0;i<ps.length;i++){var p=ps[i];p.y-=p.v;if(p.y<-30){p.y=H+20;p.x=Math.random()*W}
cx.font=p.s+'px serif';cx.fillStyle='rgba(57,197,187,'+p.o+')';cx.fillText(p.t,p.x,p.y)}
requestAnimationFrame(draw)})();
</script>
