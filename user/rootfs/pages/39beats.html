var app=document.getElementById("app");
function fail(el){el.outerHTML='<div class="ph">♪</div>'}
function list(){
var h='<header><h1>39 音源</h1><div class="sub">初音未来 · VOCALOID P 主图鉴 —— 点击卡片查看详情</div></header><div class="grid">';
for(var i=0;i<P.length;i++){var p=P[i];
h+='<div class="card" onclick="location.hash=\'#/p/'+p.id+'\'"><img class="thumb" src="'+p.img+'" loading="lazy" onerror="fail(this)"><div class="meta"><div class="name">'+p.name+'</div>';
for(var j=0;j<p.tags.length;j++)h+='<span class="tag">'+p.tags[j]+'</span>';
h+='<div class="brief">'+p.brief+'</div></div></div>'}
h+='</div>'+foot();app.innerHTML=h;window.scrollTo(0,0)}
function detail(id){
var i;for(i=0;i<P.length;i++)if(P[i].id===id)break;if(i>=P.length)return list();
var p=P[i],prev=P[(i+P.length-1)%P.length],next=P[(i+1)%P.length];
var h='<div class="detail"><a class="back" href="#/">← 返回总览</a><div class="hero"><img src="'+p.img+'" onerror="fail(this)"><div class="info"><h2>'+p.name+'</h2><div class="alias">'+p.alias+' · '+p.since+'</div>';
for(var j=0;j<p.tags.length;j++)h+='<span class="tag">'+p.tags[j]+'</span>';
h+='<div class="desc">'+p.desc+'</div><div class="works"><h3>代表作品</h3>';
for(var k=0;k<p.works.length;k++)h+='<div class="song"><span>♪ '+p.works[k][0]+'</span><i>'+p.works[k][1]+'</i></div>';
h+='</div></div></div><div class="nav"><a href="#/p/'+prev.id+'">← '+prev.name+'</a><a href="#/p/'+next.id+'">'+next.name+' →</a></div></div>'+foot();
app.innerHTML=h;window.scrollTo(0,0)}
function foot(){return '<footer>39 音源 · 为 RmikuOS 的 httpd 而作 · 图片源自公开网络，版权归原作者所有</footer>'}
function route(){var h=location.hash||"#/";
if(h.indexOf("#/p/")===0)detail(h.slice(4));else list()}
window.addEventListener("hashchange",route);route();
var cv=document.getElementById("bg"),cx=cv.getContext("2d"),ps=[];
function rs(){cv.width=innerWidth;cv.height=innerHeight}
window.addEventListener("resize",rs);rs();
for(var i=0;i<36;i++)ps.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,v:.2+Math.random()*.5,s:10+Math.random()*14,o:.06+Math.random()*.15,d:Math.random()*6.28});
(function tick(){cx.clearRect(0,0,cv.width,cv.height);
for(var i=0;i<ps.length;i++){var q=ps[i];q.y-=q.v;q.d+=.01;
if(q.y<-20){q.y=cv.height+20;q.x=Math.random()*cv.width}
cx.globalAlpha=q.o;cx.fillStyle="#39c5bb";cx.font=q.s+"px serif";
cx.fillText("♪",q.x+Math.sin(q.d)*16,q.y)}
cx.globalAlpha=1;requestAnimationFrame(tick)})();
</script>
